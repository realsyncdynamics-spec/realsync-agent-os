name: realsync_agent_os
description: RealSyncDynamics Agent-OS Mobile & Web App — Flutter Frontend
version: 1.0.0+1

# ─── SDK Constraints ──────────────────────────────────────────────────────────
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

# ─── Abhängigkeiten ───────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # HTTP-Calls zum Backend
  http: ^1.2.0

  # Lokale Token-Speicherung (SharedPreferences)
  shared_preferences: ^2.2.2

  # State-Management
  provider: ^6.1.1

  # Datum/Zeit Formatierung (DateFormat)
  intl: ^0.19.0

  # iOS-Style Icons
  cupertino_icons: ^1.0.6

# ─── Dev-Abhängigkeiten ───────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting-Regeln
  flutter_lints: ^3.0.0

# ─── Flutter Asset-Konfiguration ──────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # TODO: Eigenes Logo-Asset hinzufügen:
    # - assets/images/logo.png
    # - assets/images/logo_white.png
