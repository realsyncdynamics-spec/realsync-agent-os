# ============================================================
# RealSync Agent-OS — Cloud Run Deploy Pipeline v2
# Sprint 4: Added Workload Identity Federation option,
#           environment protection, manual approval gate,
#           and structured deploy summary.
# ============================================================
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]
      force_deploy:
        description: 'Skip test stage (emergency only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       europe-west1
  REGISTRY:     europe-west1-docker.pkg.dev
  REPOSITORY:   realsync-agent-os
  BACKEND_SVC:  realsync-backend
  GATEWAY_SVC:  realsync-gateway

# ──────────────────────────────────────────────────────────────────────────────
# 1. Lint & Unit Tests
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.force_deploy != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Unit tests
        working-directory: backend
        run: npm test --if-present

# ──────────────────────────────────────────────────────────────────────────────
# 2. Auth + Image Build (Backend)
# ──────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # ── Auth: Service Account JSON key (migrate to WIF when ready) ──────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # --- Workload Identity Federation (uncomment to migrate from SA key):
          # workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image name
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SVC }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build
        run: |
          docker build \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "eu.ai-act.compliant=true" \
            ./backend

      - name: Push
        id: push
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE:${{ github.sha }} | cut -d@ -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

# ──────────────────────────────────────────────────────────────────────────────
# 3. Image Build (Gateway)
# ──────────────────────────────────────────────────────────────────────────────
  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image name
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.GATEWAY_SVC }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          docker build \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            ./gateway
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

# ──────────────────────────────────────────────────────────────────────────────
# 4. Deploy Backend (requires GitHub Environment protection rules)
# ──────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build-backend]
    environment: production          # ← GitHub Environment: add required reviewers here
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: false      # Never cancel an in-flight deploy

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.BACKEND_SVC }} \
            --image "${{ needs.build-backend.outputs.image }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,LOG_LEVEL=info" \
            --set-secrets "\
              DATABASE_URL=DATABASE_URL:latest,\
              REDIS_URL=REDIS_URL:latest,\
              JWT_SECRET=JWT_SECRET:latest,\
              JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,\
              OPENAI_API_KEY=OPENAI_API_KEY:latest,\
              STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,\
              STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,\
              OPENCLAW_API_KEY=OPENCLAW_API_KEY:latest,\
              AGENT_INTERNAL_KEY=AGENT_INTERNAL_KEY:latest" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --port 8080 \
            --timeout 300 \
            --concurrency 80 \
            --service-account "${{ secrets.GCP_DEPLOY_SA }}" \
            --labels "sprint=4,eu-ai-act=compliant,managed-by=github-actions"

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SVC }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "SERVICE_URL=${URL}" >> $GITHUB_ENV

      - name: Smoke test — liveness
        run: |
          echo "Probing: ${SERVICE_URL}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /tmp/health.json -w "%{http_code}" "${SERVICE_URL}/health" || echo "000")
            echo "Attempt $i — HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Liveness OK:"
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "Liveness check FAILED after 5 attempts"
          exit 1

      - name: Smoke test — readiness
        run: |
          STATUS=$(curl -sf -o /tmp/ready.json -w "%{http_code}" "${SERVICE_URL}/health/ready" || echo "000")
          echo "Readiness — HTTP ${STATUS}"
          cat /tmp/ready.json || true
          if [ "${STATUS}" != "200" ]; then
            echo "WARNING: Readiness probe returned ${STATUS} — DB or Redis may not be connected yet"
          fi

      - name: Write deploy summary
        run: |
          echo "## Backend Deploy ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ env.BACKEND_SVC }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`${{ env.REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | \`${{ needs.build-backend.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EU AI Act | ✅ Compliant |" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────────────────
# 5. Deploy Gateway
# ──────────────────────────────────────────────────────────────────────────────
  deploy-gateway:
    name: Deploy Gateway
    runs-on: ubuntu-latest
    needs: [build-gateway, deploy-backend]
    environment: production
    concurrency:
      group: deploy-gateway-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SVC }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Deploy Gateway to Cloud Run
        run: |
          gcloud run deploy ${{ env.GATEWAY_SVC }} \
            --image "${{ needs.build-gateway.outputs.image }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,BACKEND_URL=${{ steps.backend.outputs.url }}" \
            --set-secrets "GATEWAY_SECRET=GATEWAY_SECRET:latest" \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --port 8443 \
            --timeout 120 \
            --service-account "${{ secrets.GCP_DEPLOY_SA }}" \
            --labels "sprint=4,managed-by=github-actions"

      - name: Gateway smoke test
        run: |
          GW_URL=$(gcloud run services describe ${{ env.GATEWAY_SVC }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${GW_URL}/health" || echo "000")
            echo "Attempt $i — HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then echo "Gateway OK"; exit 0; fi
            sleep 10
          done
          echo "Gateway health check FAILED"; exit 1

      - name: Write deploy summary
        run: |
          GW_URL=$(gcloud run services describe ${{ env.GATEWAY_SVC }} \
            --region ${{ env.REGION }} --format 'value(status.url)')
          echo "## Gateway Deploy ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ env.GATEWAY_SVC }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${GW_URL} |" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────────────────
# 6. Final Summary
# ──────────────────────────────────────────────────────────────────────────────
  summary:
    name: Deploy Complete
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-gateway]
    if: always()

    steps:
      - name: Report
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          GATEWAY="${{ needs.deploy-gateway.result }}"
          if [ "$BACKEND" = "success" ] && [ "$GATEWAY" = "success" ]; then
            echo "✅ Sprint 4 deploy complete — backend + gateway live in ${{ env.REGION }}"
            echo "## 🚀 Deploy Complete" >> $GITHUB_STEP_SUMMARY
            echo "Backend: ✅ | Gateway: ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deploy incomplete — backend: $BACKEND, gateway: $GATEWAY"
            echo "## ❌ Deploy Failed" >> $GITHUB_STEP_SUMMARY
            echo "Backend: $BACKEND | Gateway: $GATEWAY" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
