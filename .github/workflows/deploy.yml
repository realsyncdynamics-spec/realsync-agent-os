# ============================================================
# RealSync Dynamics Agent-OS — Unified Cloud Run Deployment
# Optimized for WIF (Workload Identity Federation)
# ============================================================
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: realsync-agent-os
  BACKEND_SVC: realsync-backend
  GATEWAY_SVC: realsync-gateway

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Backend
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SVC }}"
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          echo "BACKEND_IMAGE=$IMAGE:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and Push Gateway
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.GATEWAY_SVC }}"
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./gateway
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          echo "GATEWAY_IMAGE=$IMAGE:${{ github.sha }}" >> $GITHUB_ENV

      - name: Run DB Migrations
        continue-on-error: true
        run: |
          if gcloud run jobs describe realsync-db-migrate --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} > /dev/null 2>&1; then
            gcloud run jobs update realsync-db-migrate \
              --image ${{ env.BACKEND_IMAGE }} \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT_ID }}
          else
            gcloud run jobs create realsync-db-migrate \
              --image ${{ env.BACKEND_IMAGE }} \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT_ID }} \
              --command npm \
              --args "run,migrate"
          fi
          gcloud run jobs execute realsync-db-migrate \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --wait || echo "Migration skipped - add DB secret to Secret Manager first"

      - name: Deploy Backend
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SVC }}
          region: ${{ env.REGION }}
          image: ${{ env.BACKEND_IMAGE }}
          env_vars: |
            NODE_ENV=production
            ENABLE_WORKERS=true
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1

      - name: Deploy Gateway
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.GATEWAY_SVC }}
          region: ${{ env.REGION }}
          image: ${{ env.GATEWAY_IMAGE }}
          env_vars: |
            NODE_ENV=production
            BACKEND_URL=${{ steps.deploy-backend.outputs.url }}
          flags: >-
            --allow-unauthenticated
            --memory=256Mi
            --cpu=1
