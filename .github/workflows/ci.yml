name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
jobs:
  backend:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
        continue-on-error: true
      - name: Unit tests
        working-directory: backend
        run: npm test --if-present
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: |
          docker build --tag realsync-backend:ci ./backend
          echo "Backend image built"
      - name: Build gateway image
        run: |
          docker build --tag realsync-gateway:ci ./gateway
          echo "Gateway image built"
  validate-playbooks:
    name: Playbook JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate playbook JSON files
        run: |
          FAIL=0
          for f in playbooks/*.json; do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: npm audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true
  ci-summary:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [backend, docker-build, validate-playbooks, security]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
          echo "Playbooks: ${{ needs.validate-playbooks.result }}"
          echo "Security: ${{ needs.security.result }}"
      - name: Fail if critical jobs failed
        if: needs.backend.result == 'failure' || needs.docker-build.result == 'failure'
        run: exit 1
