# ============================================================
# RealSync Agent-OS — CI Validation Workflow
# Runs on every PR and push (no GCP credentials needed).
# Validates: lint, tests, Node.js syntax, Docker build,
#            JSON schema, Terraform fmt.
# ============================================================
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Backend: lint + test
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check (all JS files)
        working-directory: backend
        run: |
          find src -name '*.js' | while read f; do
            node --check "$f" && echo "  ✓ $f" || { echo "  ✗ $f"; exit 1; }
          done

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Unit tests
        working-directory: backend
        run: npm test --if-present

  # ──────────────────────────────────────────────────────────
  # 2. Docker build (no push — validates Dockerfile)
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (no push)
        run: |
          docker build \
            --tag realsync-backend:ci-${{ github.sha }} \
            --label "ci=true" \
            ./backend
          echo "✓ Backend image built successfully"

      - name: Build gateway image (no push)
        run: |
          docker build \
            --tag realsync-gateway:ci-${{ github.sha }} \
            ./gateway
          echo "✓ Gateway image built successfully"

      - name: Image size report
        run: |
          echo "## Docker Image Sizes" >> $GITHUB_STEP_SUMMARY
          docker images --format "| {{.Repository}} | {{.Tag}} | {{.Size}} |" \
            realsync-backend realsync-gateway >> $GITHUB_STEP_SUMMARY || true

  # ──────────────────────────────────────────────────────────
  # 3. Playbook JSON schema validation
  # ──────────────────────────────────────────────────────────
  validate-playbooks:
    name: Playbook JSON Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate all playbook JSON files
        run: |
          FAIL=0
          for f in playbooks/*.json; do
            if python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f — invalid JSON"
              FAIL=1
            fi
          done

          # Check required fields
          for f in playbooks/*.json; do
            for field in id name version eu_risk_level steps; do
              if ! python3 -c "
          import json,sys
          d = json.load(open('$f'))
          sys.exit(0 if '$field' in d else 1)" 2>/dev/null; then
                echo "  ✗ $f — missing required field: $field"
                FAIL=1
              fi
            done
          done
          exit $FAIL

      - name: Playbook summary
        run: |
          echo "## Playbooks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | ID | Risk Level | Steps |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in playbooks/*.json; do
            python3 -c "
          import json
          d = json.load(open('$f'))
          print(f\"| {d.get('id','-')} | {d.get('eu_risk_level','-')} | {len(d.get('steps',[]))} |\")" >> $GITHUB_STEP_SUMMARY
          done

  # ──────────────────────────────────────────────────────────
  # 4. Terraform format check (no GCP auth needed)
  # ──────────────────────────────────────────────────────────
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    if: ${{ hashFiles('terraform/*.tf') != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive
        continue-on-error: true  # warn but don't fail — devs can format locally

      - name: terraform validate (no backend)
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate
          echo "✓ Terraform configuration valid"

  # ──────────────────────────────────────────────────────────
  # 5. Security scan (npm audit)
  # ──────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: npm audit (high + critical only)
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true  # report but don't block CI

      - name: Check for secrets in code (basic)
        run: |
          # Detect common secret patterns accidentally committed
          FOUND=0
          PATTERNS=(
            "sk-[a-zA-Z0-9]{20,}"          # OpenAI keys
            "sk_live_[a-zA-Z0-9]+"          # Stripe live keys
            "AKIA[A-Z0-9]{16}"              # AWS access keys
            "-----BEGIN.*PRIVATE KEY-----"  # Private keys
          )
          for pattern in "${PATTERNS[@]}"; do
            if git diff HEAD~1 2>/dev/null | grep -qE "$pattern" || \
               grep -rqE "$pattern" --include="*.js" --include="*.ts" --include="*.env" \
               --exclude-dir=".git" --exclude-dir="node_modules" . 2>/dev/null; then
              echo "⚠️  Potential secret detected matching: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "✓ No obvious secrets detected in code"
          fi

  # ──────────────────────────────────────────────────────────
  # 6. CI Summary
  # ──────────────────────────────────────────────────────────
  ci-summary:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [backend, docker-build, validate-playbooks, security]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint & Test | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playbook Validation | ${{ needs.validate-playbooks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: needs.backend.result == 'failure' || needs.docker-build.result == 'failure'
        run: |
          echo "❌ Critical CI jobs failed — backend or Docker build broken"
          exit 1
